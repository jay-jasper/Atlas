name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo install cargo-audit --locked
      - run: ./scripts/audit_dependencies.sh

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/generate_uniffi_swift.sh
      - run: xcodebuild test -project platforms/macos/Atlas.xcodeproj -scheme "Atlas Direct" -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
      - run: xcodebuild test -project platforms/macos/Atlas.xcodeproj -scheme "Atlas Store" -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
      - run: xcodebuild test -project platforms/macos/Atlas.xcodeproj -scheme "Atlas UI Tests" -destination 'platform=macOS' CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO

  release-builds:
    runs-on: macos-15
    needs: [rust, macos]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/generate_uniffi_swift.sh
      - run: xcodebuild build -project platforms/macos/Atlas.xcodeproj -scheme "Atlas Direct" -configuration "Direct Release" -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO
      - run: xcodebuild build -project platforms/macos/Atlas.xcodeproj -scheme "Atlas Store" -configuration "Store Release" -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO
