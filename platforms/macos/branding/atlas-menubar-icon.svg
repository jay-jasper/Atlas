  <rect x="12.1" y="3.5"  width="6.4" height="5.0" rx="1.6" fill="#000000"/>
  <rect x="3.5"  y="13.5" width="6.4" height="5.0" rx="1.6" fill="#000000"/>
  <rect x="12.1" y="10.1" width="6.4" height="8.4" rx="1.6" fill="#000000"/>
</svg>
